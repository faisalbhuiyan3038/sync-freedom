<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Probe Results</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <div class="logo-row">
      <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L2 7l10 5 10-5-10-5z" fill="url(#g1)" opacity="0.9"/>
        <path d="M2 17l10 5 10-5" stroke="url(#g2)" stroke-width="2" fill="none"/>
        <path d="M2 12l10 5 10-5" stroke="url(#g2)" stroke-width="2" fill="none"/>
        <defs>
          <linearGradient id="g1" x1="2" y1="2" x2="22" y2="12">
            <stop offset="0%" stop-color="#6366f1"/>
            <stop offset="100%" stop-color="#06b6d4"/>
          </linearGradient>
          <linearGradient id="g2" x1="2" y1="12" x2="22" y2="22">
            <stop offset="0%" stop-color="#6366f1"/>
            <stop offset="100%" stop-color="#06b6d4"/>
          </linearGradient>
        </defs>
      </svg>
      <h1>Sync Freedom <span class="subtitle">API Probe</span></h1>
    </div>
    <p class="tagline">Extension API compatibility tester for mobile browsers</p>
  </header>

  <div class="summary-bar" id="summaryBar">
    <span class="summary-loading">Loading results…</span>
  </div>

  <div class="actions">
    <button id="btnRunAgain" class="btn btn-primary" disabled>
      <svg viewBox="0 0 16 16" class="btn-icon"><path d="M8 3a5 5 0 100 10A5 5 0 108 3zm0-2a7 7 0 110 14A7 7 0 018 1zm1 4v4H7V5h2z" fill="currentColor"/></svg>
      Run Tests Again
    </button>
    <button id="btnExport" class="btn btn-secondary" disabled>
      <svg viewBox="0 0 16 16" class="btn-icon"><path d="M4 8l4 4 4-4M8 12V2" stroke="currentColor" stroke-width="2" fill="none"/><path d="M2 14h12" stroke="currentColor" stroke-width="2"/></svg>
      Export JSON
    </button>
  </div>

  <div class="device-info" id="deviceInfo"></div>

  <div class="results" id="resultsContainer">
    <p class="empty-state">No results yet. Tests run automatically on install.</p>
  </div>

  <footer>
    <span id="timestamp"></span>
  </footer>

  <div class="toast" id="toast"></div>

  <script src="popup.js"></script>
</body>
</html>
